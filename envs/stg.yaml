# =============================================================================
# envs/stg.yaml — Staging environment overrides
#
# This file is deep-merged on top of input.yaml when deploying to any account
# whose environment = "stg" (e.g. mamstg, mntstg, op2mise-stg).
#
# Rules:
#   - Only specify keys you want to CHANGE from the base input.yaml.
#   - tags:    merged on top of base tags (these keys win).
#   - resources: matched by type+name. enabled and config keys are overridden
#                per-key — you don't need to repeat unchanged config.
# =============================================================================

tags: {}   # no tag overrides for stg — inherits base tags

resources:

  # ── S3 ─────────────────────────────────────────────────────────────────────
  - name: app-assets
    type: s3
    enabled: true
    config:
      lifecycle_enabled:   true
      expiry_days:         60
      intelligent_tiering: true

  - name: audit-logs
    type: s3
    enabled: true

  # ── Lambda ─────────────────────────────────────────────────────────────────
  - name: image-processor
    type: lambda
    enabled: true
    config:
      memory:             512
      log_retention_days: 7

  - name: order-processor
    type: lambda
    enabled: false

  # ── ECR ────────────────────────────────────────────────────────────────────
  - name: order-processor
    type: ecr
    enabled: false

  # ── SNS ────────────────────────────────────────────────────────────────────
  - name: order-events
    type: sns
    enabled: true

  # ── SQS ────────────────────────────────────────────────────────────────────
  - name: order-queue
    type: sqs
    enabled: true

  # ── EC2 ────────────────────────────────────────────────────────────────────
  - name: api-server
    type: ec2
    enabled: true
    config:
      instance_type:        t4g.small
      prometheus_monitoring: on
      argus_monitoring:      off

  # ── CloudFront ─────────────────────────────────────────────────────────────
  - name: cdn
    type: cloudfront
    enabled: false
