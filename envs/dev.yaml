# =============================================================================
# envs/dev.yaml — Dev environment overrides
#
# This file is deep-merged on top of input.yaml when deploying to any account
# whose environment = "dev" (e.g. tvplusdev, op2mise-dev).
#
# Rules:
#   - Only specify keys you want to CHANGE from the base input.yaml.
#   - tags:    merged on top of base tags (these keys win).
#   - resources: matched by type+name. enabled and config keys are overridden
#                per-key — you don't need to repeat unchanged config.
# =============================================================================

tags:
  cost_center: "CC-DEV-001"    # override billing code for dev

resources:

  # ── S3 ─────────────────────────────────────────────────────────────────────
  - name: app-assets
    type: s3
    enabled: true
    config:
      lifecycle_enabled:   true
      expiry_days:         30        # short retention in dev
      intelligent_tiering: false

  - name: audit-logs
    type: s3
    enabled: false                   # audit logs not needed in dev

  # ── Lambda ─────────────────────────────────────────────────────────────────
  - name: image-processor
    type: lambda
    enabled: true
    config:
      memory:             256        # smaller footprint in dev
      log_retention_days: 3

  - name: order-processor
    type: lambda
    enabled: false

  # ── ECR ────────────────────────────────────────────────────────────────────
  - name: order-processor
    type: ecr
    enabled: false

  # ── SNS ────────────────────────────────────────────────────────────────────
  - name: order-events
    type: sns
    enabled: false

  # ── SQS ────────────────────────────────────────────────────────────────────
  - name: order-queue
    type: sqs
    enabled: false

  # ── EC2 ────────────────────────────────────────────────────────────────────
  - name: api-server
    type: ec2
    enabled: false                   # EC2 off in dev — use Lambda only

  # ── CloudFront ─────────────────────────────────────────────────────────────
  - name: cdn
    type: cloudfront
    enabled: false                   # no CDN in dev
