# =============================================================================
# input.yaml — SINGLE source of truth for ALL environments.
#
# Two concepts per resource:
#   enabled:     dict of env → true/false   (which envs deploy this resource)
#   env_config:  dict of env → config keys  (env-specific overrides, merged on
#                                            top of config: before generating)
#
# The generator reads the account key → resolves env → applies enabled[env]
# and merges config + env_config[env] automatically. No other files to edit.
# =============================================================================


# ── Common tags — applied to ALL resources ─────────────────────────────────
# Two-level tag system:
#   1. Here (tags:)         — global defaults, every resource gets these
#   2. Per-resource (tags:) — additions/overrides on top of the common set
tags:
  stage:       stg              # e.g. dev | stg | prod | sandbox | perf
  owner:       platform-team    # team/person responsible
  component:   backend          # logical component: backend | frontend | data | infra
  cost_center: "CC-1001"        # billing/cost allocation code
  Terraform:   "true"
  Repo:        "infra-frame-work"
  Compliance:  "pci-dss"

resources:

  # ── S3 ─────────────────────────────────────────────────────────────────────
  - name: app-assets
    type: s3
    enabled:
      dev:  true
      stg:  true
      prod: true
    config:
      bucket_type:            standard
      versioning:             true
      encryption:             AES256
      kms_key_arn:            ""
      lifecycle_enabled:      true
      intelligent_tiering:    true
      expiry_days:            0
      access_log_bucket_name: ""
      lambda_trigger:
        enabled:       false
        lambda_name:   image-processor
        events:        ["s3:ObjectCreated:*"]
        filter_prefix: "uploads/"
        filter_suffix: ".jpg"
      tags:
        DataClassification: internal
    env_config:
      dev:
        expiry_days:         30
        intelligent_tiering: false
      stg:
        expiry_days:         60
      prod:
        expiry_days:         0    # no expiry in prod

  - name: audit-logs
    type: s3
    enabled:
      dev:  false
      stg:  true
      prod: true
    config:
      bucket_type:            logging
      versioning:             false
      encryption:             AES256
      lifecycle_enabled:      true
      intelligent_tiering:    false
      expiry_days:            90
      access_log_bucket_name: ""
      tags:
        DataClassification: restricted
        Retention: "90days"
    env_config:
      prod:
        expiry_days: 365    # 1-year retention in prod

  # ── SNS ────────────────────────────────────────────────────────────────────
  - name: order-events
    type: sns
    enabled:
      dev:  false
      stg:  true
      prod: true
    config:
      fifo:         true
      display_name: "Order Events Topic"
      kms_key_arn:  "alias/aws/sns"
      subscriptions:
        - protocol: email
          endpoint: ops@op2mise.com
      tags:
        Component: messaging

  # ── SQS ────────────────────────────────────────────────────────────────────
  - name: order-queue
    type: sqs
    enabled:
      dev:  false
      stg:  false
      prod: true
    config:
      fifo:                        true
      content_based_deduplication: true
      high_throughput_fifo:        true
      visibility_timeout:          30
      message_retention:           86400
      max_message_size:            262144
      delay_seconds:               0
      receive_wait_time_seconds:   0
      sqs_managed_sse_enabled:     true
      dlq_enabled:                 false
      dlq_max_receive_count:       3
      dlq_message_retention:       1209600
      lambda_trigger:
        enabled:     false
        lambda_name: order-processor
        batch_size:  10
      tags:
        Component: messaging
    env_config:
      prod:
        dlq_enabled:           true
        dlq_max_receive_count: 5
        message_retention:     604800    # 7 days in prod

  # ── Lambda ─────────────────────────────────────────────────────────────────
  - name: image-processor
    type: lambda
    enabled:
      dev:  true
      stg:  true
      prod: true
    config:
      package_type:       zip
      runtime:            python3.12
      handler:            handler.main
      # filename:         "path/to/deployment.zip"
      # source_code_hash: ""
      arch:               arm64
      timeout:            30
      memory:             512
      log_retention_days: 14
      iam_role_create:    true
      # iam_role_arn:     "arn:aws:iam::123456789012:role/my-lambda-role"
      service_access:     [s3, ssm]
      # s3_resource_arns:  ["arn:aws:s3:::my-bucket"]
      # ssm_resource_arns: ["arn:aws:ssm:ap-south-1:*:parameter/myapp/*"]
      vpc_enabled:        false
      environment_variables:
        LOG_LEVEL: INFO
      permission_boundary: ""
      tags:
        Component: image-processing
    env_config:
      dev:
        memory:             256
        log_retention_days: 3
      stg:
        memory:             512
        log_retention_days: 7
      prod:
        memory:             1024
        timeout:            60
        log_retention_days: 30

  - name: order-processor
    type: lambda
    enabled:
      dev:  false
      stg:  false
      prod: true
    config:
      package_type:       container
      ecr_name:           order-processor
      # image_uri:        "123456789012.dkr.ecr.ap-south-1.amazonaws.com/my-repo:v1"
      # image_tag:        "latest"
      # image_command:    ["handler.main"]
      # image_entry_point: ["/lambda-entrypoint.sh"]
      # image_working_directory: "/var/task"
      arch:               arm64
      timeout:            60
      memory:             1024
      log_retention_days: 14
      iam_role_create:    true
      # iam_role_arn:     ""
      service_access:     [sqs, dynamodb]
      # sqs_resource_arns:      ["arn:aws:sqs:ap-south-1:*:my-queue"]
      # dynamodb_resource_arns: ["arn:aws:dynamodb:ap-south-1:*:table/my-table"]
      vpc_enabled:        false
      environment_variables:
        LOG_LEVEL: INFO
      tags:
        Component: order-processing
    env_config:
      prod:
        memory:             2048
        timeout:            120
        log_retention_days: 30

  # ── ECR ────────────────────────────────────────────────────────────────────
  - name: order-processor
    type: ecr
    enabled:
      dev:  false
      stg:  false
      prod: true
    config:
      scan_on_push:               true
      tag_immutability:           true
      encryption:                 AES256
      max_image_count:            100
      lambda_integration_enabled: false
      tags:
        Component: order-processing
    env_config:
      prod:
        max_image_count: 50

  # ── EC2 ────────────────────────────────────────────────────────────────────
  - name: api-server
    type: ec2
    enabled:
      dev:  false
      stg:  true
      prod: true
    config:
      arch:          arm64
      os:            ubuntu
      instance_type: t4g.small

      # AMI — "auto" picks latest for os+arch, or specify a specific AMI ID
      ami:           auto
      # ami:         ami-0abcdef1234567890

      key_pair_create:        true
      existing_key_pair_name: ""

      sg_create:       false
      existing_sg_ids: ["sg-093b250b42b59d761"]
      ingress_rules:
        - from_port:   22
          to_port:     22
          protocol:    tcp
          cidr_blocks: ["10.0.0.0/8"]
          description: "SSH from VPN"
        - from_port:   443
          to_port:     443
          protocol:    tcp
          cidr_blocks: ["0.0.0.0/0"]
          description: "HTTPS"

      # VPC + Subnet are REQUIRED — do not deploy into default VPC
      vpc_id:    "vpc-0ee2b63f8be992131"
      subnet_id: "subnet-0a74de6bc4c76a1b4"

      asg_enabled: false

      ebs_encryption:  default
      ebs_kms_key_arn: ""
      ebs_volumes:
        - device_name: /dev/xvda
          size:        30
          type:        gp3

      iam_role_create:           false
      iam_role_name:             "admin-role"
      existing_instance_profile: ""
      imdsv2_enabled:            true

      # ── User data (bootstrap script, plain text) ────────────────────────
      # user_data: |
      #   #!/bin/bash
      #   yum update -y

      # ── EC2 monitoring integrations ──────────────────────────────────────
      prometheus_monitoring: on
      argus_monitoring:      off

      tags:
        Component:   api
        Application: order-service
    env_config:
      prod:
        instance_type:         t4g.xlarge
        argus_monitoring:      on

  # ── CloudFront ─────────────────────────────────────────────────────────────
  - name: cdn
    type: cloudfront
    enabled:
      dev:  false
      stg:  false
      prod: true
    config:
      origins:
        - s3_bucket_name: app-assets
          origin_id:      s3-assets
          origin_type:    s3
          origin_path:    ""

      cache_enabled:          true
      viewer_protocol_policy: redirect-to-https
      allowed_methods:        ["GET", "HEAD"]
      cached_methods:         ["GET", "HEAD"]

      # WAF — set waf_enabled: true to protect the distribution
      waf_enabled: false
      waf:
        create:             true
        waf_web_acl_id:     ""
        rate_limit_enabled: true
        rate_limit:         2000

      # Custom domain aliases (requires ACM certificate)
      # aliases:             ["cdn.example.com"]
      # acm_certificate_arn: "arn:aws:acm:us-east-1:123456789012:certificate/xxx"
      default_root_object: "index.html"

      logging_enabled:     false
      logging_bucket_name: ""
      price_class:         PriceClass_All
      tags:
        Component: cdn
    env_config:
      prod:
        waf_enabled: true
