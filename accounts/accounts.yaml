# accounts.yaml — one entry per AWS account.
#
# name_prefix  = short prefix used in ALL resource names
#                Format: <name_prefix>-<region>-<project>-<type>-<name>
#                e.g. dev → dev-ap-south-1-myapp-s3-app-assets
#                     stg → stg-ap-south-1-myapp-s3-app-assets
#                     prd → prd-ap-south-1-myapp-s3-app-assets
#
# environment  = full env name used for:
#                  - tags (Environment tag)
#                  - state bucket key path
#                  - GitHub environment approval gates
#                  - resolve_enabled(r, env) lookup in input.yaml
#
# role_name    = IAM role in THIS account that github-oidc-role (mgmt) assumes
# =============================================================================

# ── Development ───────────────────────────────────────────────────────────────
dev:
  environment:  dev
  name_prefix:  dev
  project_name: myapp
  account_id:   "533269020590"     # replace with real dev account ID
  role_name:    admin-role         # name of the IAM role in this account that github-oidc-role assumes
  region:       us-east-1
  owner:        platform-team
  cost_center:  "CC-DEV-001"

# ── Staging ───────────────────────────────────────────────────────────────────
stg:
  environment:  stg
  name_prefix:  stg
  project_name: myapp
  account_id:   "222222222222"     # replace with real stg account ID
  role_name:    admin-role         # name of the IAM role in this account that github-oidc-role assumes
  region:       ap-south-1
  owner:        platform-team
  cost_center:  "CC-STG-001"

# ── Production ────────────────────────────────────────────────────────────────
prd:
  environment:  prod
  name_prefix:  prd
  project_name: myapp
  account_id:   "333333333333"     # replace with real prod account ID
  role_name:    admin-role         # name of the IAM role in this account that github-oidc-role assumes
  region:       ap-south-1
  owner:        platform-team
  cost_center:  "CC-PRD-001"
