# accounts.yaml
# name_prefix  = the SHORT prefix used in ALL resource names.
#                Format: <stage>-<region>-<project>-<type>-<name>
#                e.g. mamstg  → name_prefix: stg   → stg-ap-south-1-mam-s3-assets
#                     mamprd  → name_prefix: prd   → prd-ap-south-1-mam-s3-assets
#                     tvplusdev → name_prefix: dev → dev-ap-south-1-tvplus-s3-assets
#                     mntstg  → name_prefix: stg   → stg-ap-south-1-mnt-s3-assets
#                     mntprd  → name_prefix: prd   → prd-ap-south-1-mnt-s3-assets
# environment  = full env name used for tags/state path only (not resource names)

# ── MAM — Staging ─────────────────────────────────────────────────────────────
mamstg:
  environment:  stg
  name_prefix:  stg           # drives ALL resource names
  project_name: mam
  account_id:   "533269020590"
  role_name:    admin-role
  region:       ap-south-1
  owner:        mam-team
  cost_center:  "CC-MAM-01"

