# .github/workflows/destroy.yml
#
# Destroy a SINGLE resource or ALL resources for a given account.
# resource_target is optional — leave blank to destroy everything.
#
# Examples:
#   account=mamstg,  resource_target=         → destroy ALL in mamstg
#   account=mamprd,  resource_target=ec2-api-server → destroy only that EC2
#   account=tvplusdev, resource_target=s3-app-assets → destroy only that S3

name: "Destroy"

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Account key (see accounts/accounts.yaml)"
        required: true
        type: choice
        options:
          - mamstg
          - mamprd
          - tvplusdev
          - mntstg
          - mntprd
          - op2mise-dev
          - op2mise-stg
          - op2mise-prod
      resource_target:
        description: "Single resource to destroy e.g. ec2-api-server (blank = ALL)"
        required: false
        default: ""
      confirm:
        description: "Type the account key again to confirm"
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.3"
  TG_VERSION: "0.68.9"

jobs:
  # ── Validate confirmation ──────────────────────────────────────────────────
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation matches account
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.account }}" ]; then
            echo "::error::Confirmation '${{ github.event.inputs.confirm }}' does not match account '${{ github.event.inputs.account }}'"
            exit 1
          fi
          echo "Confirmation OK"

  # ── Resolve account metadata ───────────────────────────────────────────────
  resolve:
    name: "Resolve Account"
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      account:     ${{ steps.info.outputs.account }}
      environment: ${{ steps.info.outputs.environment }}
      region:      ${{ steps.info.outputs.region }}
      gate:        ${{ steps.info.outputs.gate }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with: { python-version: "3.12" }
      - run: pip install -q pyyaml

      - name: Resolve account info
        id: info
        run: |
          ACCOUNT="${{ github.event.inputs.account }}"
          ENV=$(python3 scripts/get_account_info.py "$ACCOUNT" environment)
          REGION=$(python3 scripts/get_account_info.py "$ACCOUNT" region)
          case "$ENV" in
            prod|prd) GATE="prod-approval" ;;
            stg)      GATE="stg-approval"  ;;
            *)        GATE="dev-approval"  ;;
          esac
          echo "account=$ACCOUNT"   >> $GITHUB_OUTPUT
          echo "environment=$ENV"   >> $GITHUB_OUTPUT
          echo "region=$REGION"     >> $GITHUB_OUTPUT
          echo "gate=$GATE"         >> $GITHUB_OUTPUT

          TARGET="${{ github.event.inputs.resource_target }}"
          SCOPE=$([ -n "$TARGET" ] && echo "SINGLE: $TARGET" || echo "ALL RESOURCES")
          echo "### DESTROY requested" >> $GITHUB_STEP_SUMMARY
          echo "| Account | \`$ACCOUNT\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`$ENV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | **$SCOPE** |"     >> $GITHUB_STEP_SUMMARY
          echo "| Gate | \`$GATE\` |"       >> $GITHUB_STEP_SUMMARY

  # ── Approval gate ──────────────────────────────────────────────────────────
  approval:
    name: "Approval (${{ needs.resolve.outputs.gate }})"
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.gate }}
    steps:
      - run: |
          TARGET="${{ github.event.inputs.resource_target }}"
          SCOPE=$([ -n "$TARGET" ] && echo "SINGLE: $TARGET" || echo "ALL RESOURCES")
          echo "Destroy approved: $SCOPE in ${{ needs.resolve.outputs.account }}"

  # ── Destroy ────────────────────────────────────────────────────────────────
  destroy:
    name: "Destroy ${{ github.event.inputs.resource_target || 'ALL' }} (${{ needs.resolve.outputs.account }})"
    needs: [resolve, approval]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sLo /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with: { python-version: "3.12" }
      - run: pip install pyyaml

      - name: Auth — management account
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume:        arn:aws:iam::${{ secrets.MGMT_ACCOUNT_ID }}:role/${{ secrets.MGMT_ROLE_NAME }}
          role-session-name:     gh-destroy-${{ needs.resolve.outputs.account }}-${{ github.run_id }}
          aws-region:            ${{ needs.resolve.outputs.region }}
          role-duration-seconds: 3600

      - name: Auth — assume target account role
        run: |
          ACCOUNT="${{ needs.resolve.outputs.account }}"
          ACCOUNT_ID=$(python3 scripts/get_account_info.py "$ACCOUNT" account_id)
          ROLE_NAME=$(python3 scripts/get_account_info.py  "$ACCOUNT" role_name)
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}" \
            --role-session-name "tg-destroy-${ACCOUNT}-${{ github.run_id }}" \
            --query Credentials --output json)

          AK=$(echo "$CREDS" | jq -r .AccessKeyId)
          SK=$(echo "$CREDS" | jq -r .SecretAccessKey)
          ST=$(echo "$CREDS" | jq -r .SessionToken)
          echo "::add-mask::${SK}"
          echo "::add-mask::${ST}"
          echo "AWS_ACCESS_KEY_ID=${AK}"         >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${SK}"      >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=${ST}"           >> $GITHUB_ENV
          echo "MGMT_ACCOUNT_ID=${{ secrets.MGMT_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "TF_ACCOUNT_KEY=${ACCOUNT}"         >> $GITHUB_ENV

      - name: Generate configs
        run: |
          TARGET="${{ github.event.inputs.resource_target }}"
          ACCOUNT="${{ needs.resolve.outputs.account }}"
          if [ -n "$TARGET" ]; then
            python3 scripts/generate_configs.py input.yaml . --account "$ACCOUNT" --target "$TARGET"
          else
            python3 scripts/generate_configs.py input.yaml . --account "$ACCOUNT"
          fi

      - name: Show what will be destroyed
        run: |
          echo "Resources to destroy:"
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            echo "  - $(basename $(dirname $p))"
          done < generated_modules.txt

      - name: Terragrunt destroy (reverse order)
        run: |
          set -e
          mapfile -t MODULES < generated_modules.txt
          for (( i=${#MODULES[@]}-1; i>=0; i-- )); do
            p="${MODULES[$i]}"
            [ -z "$p" ] && continue
            dir=$(dirname "$p")
            name=$(basename "$dir")
            echo "::group::Destroying $name"
            terragrunt destroy \
              --terragrunt-working-dir "$dir" \
              --terragrunt-non-interactive \
              -auto-approve -no-color 2>&1 | tee "destroy_${name}.log"
            EXIT_CODE=${PIPESTATUS[0]}
            echo "::endgroup::"
            if [ $EXIT_CODE -ne 0 ]; then
              echo "::error::Destroy failed for $name"
              exit $EXIT_CODE
            fi
            echo "Done: $name destroyed"
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: destroy-logs-${{ github.run_id }}
          path: "destroy_*.log"
          retention-days: 30
