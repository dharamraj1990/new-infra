name: "Drift Detection"

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      account:
        description: "Account key to check (see accounts/accounts.yaml)"
        type: choice
        options:
          - mamstg
          - mamprd
          - tvplusdev
          - mntstg
          - mntprd
          - op2mise-dev
          - op2mise-stg
          - op2mise-prod

permissions:
  id-token: write
  contents: read
  issues:   write

env:
  TF_VERSION:  "1.10.3"
  TG_VERSION:  "0.68.9"

jobs:
  drift:
    name: "Drift — ${{ matrix.account }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.account)) || fromJSON('["mamstg","mamprd","tvplusdev","mntstg","mntprd","op2mise-dev","op2mise-stg","op2mise-prod"]') }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          TG_VER="${{ env.TG_VERSION }}"
          BASE="https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VER}"
          curl -sLo /usr/local/bin/terragrunt    "${BASE}/terragrunt_linux_amd64"
          curl -sLo /tmp/tg_sha256sums.txt       "${BASE}/SHA256SUMS"
          grep "terragrunt_linux_amd64" /tmp/tg_sha256sums.txt \
            | awk '{print $1 "  /usr/local/bin/terragrunt"}' \
            | sha256sum -c -
          chmod +x /usr/local/bin/terragrunt

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with: { python-version: "3.12" }
      - run: pip install pyyaml

      - name: Auth — management
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume:        arn:aws:iam::${{ secrets.MGMT_ACCOUNT_ID }}:role/${{ secrets.MGMT_ROLE_NAME }}
          role-session-name:     gh-drift-${{ matrix.account }}-${{ github.run_id }}
          aws-region:            ${{ vars.AWS_REGION || 'ap-south-1' }}
          role-duration-seconds: 3600

      - name: Auth — target
        run: |
          set -eo pipefail
          ACCOUNT_ID=$(python3 scripts/get_account_info.py "${{ matrix.account }}" account_id)
          ROLE_NAME=$(python3 scripts/get_account_info.py  "${{ matrix.account }}" role_name)
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}" \
            --role-session-name "drift-${{ matrix.account }}" \
            --query Credentials --output json)

          AK=$(echo "$CREDS" | jq -r .AccessKeyId)
          SK=$(echo "$CREDS" | jq -r .SecretAccessKey)
          ST=$(echo "$CREDS" | jq -r .SessionToken)
          echo "::add-mask::${SK}"
          echo "::add-mask::${ST}"
          echo "AWS_ACCESS_KEY_ID=${AK}"         >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${SK}"      >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=${ST}"           >> $GITHUB_ENV
          echo "MGMT_ACCOUNT_ID=${{ secrets.MGMT_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "TF_ACCOUNT_KEY=${{ matrix.account }}"           >> $GITHUB_ENV

      - name: Generate configs
        run: python3 scripts/generate_configs.py input.yaml . --account "${{ matrix.account }}"

      - name: Plan (detect drift)
        id: plan
        run: |
          DRIFT=false
          DRIFTED=""
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            dir=$(dirname "$p")
            name=$(basename "$dir")
            set +e
            terragrunt plan \
              --terragrunt-working-dir "$dir" \
              --terragrunt-non-interactive \
              -detailed-exitcode -no-color 2>&1 | tee "drift_${name}.log"
            CODE=${PIPESTATUS[0]}
            set -e
            if [ "$CODE" -eq 2 ]; then
              DRIFT=true
              DRIFTED="$DRIFTED $name"
            fi
          done < generated_modules.txt
          echo "drift=$DRIFT"         >> $GITHUB_OUTPUT
          echo "drifted=$DRIFTED"     >> $GITHUB_OUTPUT

      - name: Open GitHub Issue on drift
        if: steps.plan.outputs.drift == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const account  = '${{ matrix.account }}';
            const drifted  = '${{ steps.plan.outputs.drifted }}'.trim().split(' ').filter(Boolean);
            const runUrl   = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const title    = `[DRIFT] ${account} drifted — ${new Date().toISOString().slice(0,10)}`;
            const body     = `## Drift detected in \`${account}\`\n\n**Modules:** ${drifted.map(m=>`\`${m}\``).join(', ')}\n\n**Run:** [${context.runId}](${runUrl})\n\nReview the run logs and re-apply to remediate.`;
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: `drift,${account}`
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issues[0].number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['drift', account] });
            }

      - name: Upload drift logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: drift-${{ matrix.account }}-${{ github.run_id }}
          path: "drift_*.log"
          retention-days: 7

      - name: Fail on drift
        if: steps.plan.outputs.drift == 'true'
        run: |
          echo "::error::Drift in ${{ matrix.account }}: ${{ steps.plan.outputs.drifted }}"
          exit 1
